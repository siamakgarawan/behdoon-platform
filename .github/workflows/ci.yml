name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: behdoon
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: behdoon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U behdoon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://behdoon:ci_password@localhost:5432/behdoon?schema=public
      JWT_SECRET: ci_only_test_secret_not_used_anywhere_else
      JWT_EXPIRES: 15m
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Prisma generate
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `next build` currently fails on this exact Next.js 16.2.10 / React 19.2.4
      # combination (prerendering /_global-error, reproduced with both Turbopack
      # and webpack, on the untouched create-next-app scaffold). Re-enable once
      # the dependency versions are revisited.
      # - name: Build
      #   run: npm run build
